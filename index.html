<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
}

.container {
    text-align: center;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    opacity: 0.7;
    margin-bottom: 20px;
}

.loader {
    width: 60px;
    height: 60px;
    border: 5px solid #333;
    border-top: 5px solid #00ffcc;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    opacity: 0.5;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <div class="loader"></div>
    <h1>Sedang Perbaikan</h1>
    <p>Website sedang dalam proses maintenance.<br>
    Silakan kembali beberapa saat lagi 😁😄.</p>
</div>

<div class="footer">
© 2026 Abqory
</div>

</body>
</html>
